# Per-crate Cargo configuration for the blog-api Worker.
#
# This file is consumed automatically by Cargo when any command runs
# inside `blog/apps/api/` (or a subdirectory).

[env]
# Base directory for TypeScript bindings generated by `ts-rs`. With
# `relative = true`, Cargo interprets the value relative to the parent
# directory of the `.cargo/` directory that contains this file — that is,
# `blog/apps/api/` (the crate root). From there, `../site/src/api-types`
# lands at `blog/apps/site/src/api-types`, alongside the rest of the
# static-site source.
#
# Individual types in `src/dto.rs` do not need to set `export_to`; `ts-rs`
# derives the filename from the type name (e.g. `Post` -> `Post.ts`).
TS_RS_EXPORT_DIR = { value = "../site/src/api-types", relative = true }
