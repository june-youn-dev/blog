name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      # `rustup show` triggers the toolchain install declared in
      # rust-toolchain.toml (stable 1.94.1 + clippy + wasm32 target).
      # Nightly is installed separately for rustfmt only.
      - name: Install Rust toolchain
        run: |
          rustup show
          rustup toolchain install nightly --component rustfmt --profile minimal

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: apps/api

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/api/package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run standard package verification
        run: pnpm run check

  site:
    name: Site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/site/package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: apps/site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run standard package verification
        run: pnpm run check
